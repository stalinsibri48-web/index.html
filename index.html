<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Deportivo</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  transition: 0.5s;
  background: #87ceeb;
}

.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #2b2b2b;
}

.linea {
  position: absolute;
  bottom: 60px;
  width: 100%;
  height: 5px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
}

.auto {
  position: absolute;
  bottom: 120px;
  left: 0px;
  transition: left 0.4s linear;
}

.cuerpo {
  width: 120px;
  height: 40px;
  background: red;
  border-radius: 20px 20px 10px 10px;
  position: relative;
}

.techo {
  width: 60px;
  height: 25px;
  background: #c62828;
  position: absolute;
  top: -20px;
  left: 30px;
  border-radius: 10px;
}

.ventana {
  width: 40px;
  height: 15px;
  background: #90caf9;
  position: absolute;
  top: 3px;
  left: 10px;
  border-radius: 5px;
}

.luz {
  width: 8px;
  height: 8px;
  background: yellow;
  position: absolute;
  left: -5px;
  top: 15px;
  border-radius: 50%;
  box-shadow: 0 0 10px yellow;
}

.freno {
  width: 8px;
  height: 8px;
  background: red;
  position: absolute;
  right: -5px;
  top: 15px;
  border-radius: 50%;
  box-shadow: 0 0 10px red;
  opacity: 0;
}

.rueda {
  width: 25px;
  height: 25px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: -15px;
}

.r1 { left: 15px; }
.r2 { left: 80px; }

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.girando {
  animation: girar 0.3s linear infinite;
}

.humo {
  position: absolute;
  left: -20px;
  bottom: 10px;
  width: 12px;
  height: 12px;
  background: gray;
  border-radius: 50%;
  opacity: 0;
}

@keyframes humoAnim {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  100% { transform: translateY(-40px) scale(2); opacity: 0; }
}

.humo.activo {
  animation: humoAnim 1s infinite;
}

#distancia {
  margin-top: 20px;
  font-size: 22px;
}

#estado {
  font-size: 24px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🏎️ Auto Deportivo Inteligente</h1>
<div id="distancia">Conectando con ESP32...</div>
<div id="estado"></div>

<div class="auto" id="auto">
  <div class="cuerpo">
    <div class="techo">
      <div class="ventana"></div>
    </div>
    <div class="luz"></div>
    <div class="freno" id="freno"></div>
  </div>
  <div class="rueda r1" id="r1"></div>
  <div class="rueda r2" id="r2"></div>
  <div class="humo" id="humo"></div>
</div>

<div class="calle"></div>
<div class="linea"></div>

<script>

// 🔑 TU TOKEN (debe coincidir con tu ESP32 en TagoIO)
const token = "d5d327b5-b402-4f2e-8fd3-f08d67986b2f";

function actualizar() {
  fetch("https://api.tago.io/data?limit=1", {
    method: "GET",
    headers: {
      "Content-Type": "application/json",
      "Device-Token": token
    }
  })
  .then(res => res.json())
  .then(data => {

    if (!data.result || data.result.length === 0) {
      document.getElementById("distancia").innerHTML = "⚠️ Sin datos del ESP32";
      return;
    }

    let d = parseFloat(data.result[0].value);

    document.getElementById("distancia").innerHTML = "Distancia: " + d.toFixed(1) + " cm";

    let auto = document.getElementById("auto");
    let estado = document.getElementById("estado");
    let freno = document.getElementById("freno");
    let humo = document.getElementById("humo");
    let r1 = document.getElementById("r1");
    let r2 = document.getElementById("r2");

    let max = window.innerWidth - 150;
    let pos = (d / 100) * max;
    pos = Math.max(0, Math.min(pos, max));
    auto.style.left = pos + "px";

    document.body.style.background = (d < 20) ? "#0b1a2a" : "#87ceeb";

    if (d < 15) {
      estado.innerHTML = "🚨 FRENANDO";
      freno.style.opacity = 1;
      humo.classList.remove("activo");
      r1.classList.remove("girando");
      r2.classList.remove("girando");
    } else {
      estado.innerHTML = (d < 30) ? "⚠️ Acercándose" : "🟢 A TODA VELOCIDAD";
      freno.style.opacity = 0;
      humo.classList.add("activo");
      r1.classList.add("girando");
      r2.classList.add("girando");
    }

  })
  .catch(err => {
    console.error("Error:", err);
    document.getElementById("distancia").innerHTML = "❌ Error de conexión con TagoIO";
  });
}

// 🔁 Actualiza cada segundo
setInterval(actualizar, 1000);

</script>

</body>
</html>
