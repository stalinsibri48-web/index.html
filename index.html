<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Distancia</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 40px; border-radius: 30px; border: 2px solid #333; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .distancia-valor { font-size: 5rem; font-weight: 800; margin: 10px 0; color: #fff; }
        .semaforo-chato { display: flex; gap: 20px; background: #222; padding: 20px; border-radius: 100px; border: 2px solid #444; margin: 20px 0; }
        .luz { width: 65px; height: 65px; border-radius: 50%; background: #111; transition: 0.3s; }
        
        /* Colores Planos Activos */
        .rojo.active { background: #ff4444; box-shadow: 0 0 30px #ff4444; }
        .amarillo.active { background: #ffcc00; box-shadow: 0 0 30px #ffcc00; }
        .verde.active { background: #00ff88; box-shadow: 0 0 30px #00ff88; }
        
        .status { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status" id="con-status">Buscando Sensor...</div>
        <div class="distancia-valor" id="num">---</div>
        <div class="semaforo-chato">
            <div id="v" class="luz verde"></div>
            <div id="a" class="luz amarillo"></div>
            <div id="r" class="luz rojo"></div>
        </div>
        <div style="color:#666">CENTÍMETROS</div>
    </div>

    <script>
        const TOKEN = "13216bb3-4a57-408e-9b3e-70c73a628135";

        async function refreshData() {
            try {
                // Pedimos el último dato a la API de TagoIO directamente
                const resp = await fetch('https://api.tago.io/data?variable=distancia&qty=1', {
                    headers: { 'Device-Token': TOKEN }
                });
                const data = await resp.json();

                if (data.status && data.result.length > 0) {
                    const val = parseFloat(data.result[0].value);
                    document.getElementById('num').innerText = val.toFixed(1);
                    document.getElementById('con-status').innerText = "En Línea";
                    document.getElementById('con-status').style.color = "#00ff88";

                    // Lógica de luces
                    document.getElementById('r').classList.toggle('active', val < 10);
                    document.getElementById('a').classList.toggle('active', val >= 10 && val <= 30);
                    document.getElementById('v').classList.toggle('active', val > 30);
                }
            } catch (e) {
                document.getElementById('con-status').innerText = "Error de Conexión";
            }
        }

        // Actualiza cada 1 segundo
        setInterval(refreshData, 1000);
    </script>
</body>
</html>
